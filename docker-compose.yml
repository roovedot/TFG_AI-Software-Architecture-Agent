services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ${ENV_FILE}
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "8501:8501"
    env_file:
      - ${ENV_FILE}
    depends_on:
      - api
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ─── Development only: Ollama para LLM local ─────────────────────────────

  ollama:
    image: ollama/ollama:latest
    profiles: ["dev"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_FLASH_ATTENTION=true
      - OLLAMA_KV_CACHE_TYPE=q8_0
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  qdrant_data:
  ollama_data:
